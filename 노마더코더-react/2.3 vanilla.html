<!DOCTYPE html>
<html lang="ko">

    <body>
        <div id="root"></div>
    </body>

    <!-- React JS는 어플리케이션이 아주 interactive하도록 만들어주는 library -->
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    
    <!-- React-dom : 모든 React element들을 HTML body안에 둘 수 있도록 해주는 library(or packcage) -->
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    
    <script>
        const root = document.getElementById("root");
        //JSX 방식 : const Title = <h3 id="title" onMouseEnter={() => console.log("mouse enter")}>Hello I'm a Title</h3>
        const h3 = React.createElement(
            "h3", //첫번째 - 생성하고자 하는 html 태그(element:h3) - h3가 생성됨 but body안에는 들어와 있지 않음
            {   
                id:"sexy-h3",
                onMouseEnter:() => console.log("mouse enter"),
                style: { color: 'lightblue' },
            },
            //{ id:"sexy-h3", style : {color:'lightblue'}},  두번째 - attribute : id, id attribute의 value : sexy-h3 property는 html DOM 안에서 attribute 를 가리키는(혹은 대신하는) 표현
            "Hello I'm a h3" //세번째  - 태그안의 내용
            );
        //body 안에 넣는 법 render의 의미는 React element를 가지고  HTML로 만들어 배치한다는 것 = 사용자한테 보여준다는 의미

        //JSX 방식 : const Button = <button style={{ backgroundColor:"hotpink"}}  onClick = {() => console.log("i'm clicked")}>Click me</button>
        const btn = React.createElement(
            "button", 
            {
                onClick : () => console.log("i'm clicked"),
                style : {
                    backgroundColor:"hotpink",
                },
            },  // JS의 button.addEventListener("click", handleClick);
            "Click me"
        );        
        const container = React.createElement("div",null,[h3, btn]); //2개(h3, btn)의 component를 생성했다!

        ReactDOM.render(container, root);  // h3와 btn을 같이 넣고싶을 때 두개 다 div에 싸서 div를 root안에 넣어줌
        // ReactDOM.render(h3, root);  // h3를 root안에 넣을때
        // ReactDOM.render(btn, root);  // btn을 root안에 넣을때
    </script>
</html>
