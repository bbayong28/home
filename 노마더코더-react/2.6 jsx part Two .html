<!DOCTYPE html>
<html lang="ko">

    <body>
        <div id="root"></div>
    </body>

    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const root = document.getElementById("root");        
        //jsx 방식
        function Title () {
            return(  
            <h3 id="title" onMouseEnter={() => console.log("mouse enter")}>
            Hello I'm a Title
            </h3>
            );
        }
        function Button () {
            return( 
            <button style={{ backgroundColor:"hotpink"}}  onClick = {() => console.log("i'm clicked")}>
                Click me
            </button>
            );
        }    
        
        //컴포넌트를 다른 컴포넌트 안에 넣는 법
        const Container = () => (
            <div>
                {/*component 첫글자는 대문자여야함!!!!*/}
                <Title />
                <Button />
            </div>
        );

        // ReactDOM.render(Container, root);  
        ReactDOM.render(<Container/>, root);  

        // 화살표 함수의 = () => (  와  function 함수의 return문까지 는 같다.
        // 화살표 함수의 = () => ( 는  function 함수의 function이랑 return문을 이미 포함하고 있는것
        // 하는일이 같아서 사람들은 화살표 함수를 더 선호함.

    </script>
</html>
