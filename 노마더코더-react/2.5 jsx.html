<!DOCTYPE html>
<html lang="ko">

    <body>
        <div id="root"></div>
    </body>

    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <!-- Babel : jsx로 적은 코드를 브라우저가 이해할 수 있는 형태로 바꿔주는 것. 
        script에 type = "text/bable;"요곳도 적어줘야 실행됨-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const root = document.getElementById("root");        
        //jsx 방식
        const Title = <h3 id="title" onMouseEnter={() => console.log("mouse enter")}>Hello I'm a Title</h3>
        const Button = <button style={{ backgroundColor:"hotpink"}}  onClick = {() => console.log("i'm clicked")}>Click me</button>        
        const container = React.createElement("div",null,[Title, Button]);
        ReactDOM.render(container, root);  
        
        //jsx 방식으로 바꿨지만 에러가 뜸 왜냐면 브라우저가 jsx를 이해할 수 있게 뭔가를 설치해줘야함
        //뭔가 = babel이고 위에껄 밑에꺼처럼 바꿔줘야하는데 바벨설치하면 한번에 알아서 바꿔줌.
        //const element=(<h1 className="greeting">Hello, world!</h1>);
        //const element=React.createElement('h1', {className:'greeting'}, 'Hello, world!');
    </script>
</html>
